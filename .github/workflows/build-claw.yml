name: Build YourClaw Client

on:
  workflow_dispatch:
    inputs:
      buildId:
        description: 'Build record ID from license system'
        required: true
      siteUrl:
        description: 'Site URL (e.g. https://ai.example.com)'
        required: true
      siteName:
        description: 'Client name (e.g. 智脑AI)'
        required: true
      licenseKey:
        description: 'License key'
        required: true
      primaryColor:
        description: 'Brand color (e.g. #4F46E5)'
        required: false
        default: '#4F46E5'
      logoUrl:
        description: 'Logo URL (optional)'
        required: false
        default: ''
      supportWechat:
        description: 'Support wechat (optional)'
        required: false
        default: ''
      supportEmail:
        description: 'Support email (optional)'
        required: false
        default: ''
      platforms:
        description: 'Platforms: win,mac,mac-arm64 (comma separated)'
        required: false
        default: 'win,mac,mac-arm64'
      callbackUrl:
        description: 'Callback URL to report build result'
        required: true

env:
  BUILD_ID: ${{ github.event.inputs.buildId }}

jobs:
  build-win:
    if: contains(github.event.inputs.platforms, 'win')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download logo
        if: github.event.inputs.logoUrl != ''
        shell: bash
        run: |
          curl -fsSL "${{ github.event.inputs.logoUrl }}" -o resources/icon.png || true

      - name: Inject brand
        run: |
          node scripts/build-branded.js ^
            --siteUrl=${{ github.event.inputs.siteUrl }} ^
            --siteName=${{ github.event.inputs.siteName }} ^
            --licenseKey=${{ github.event.inputs.licenseKey }} ^
            --color=${{ github.event.inputs.primaryColor }} ^
            --supportWechat=${{ github.event.inputs.supportWechat }} ^
            --supportEmail=${{ github.event.inputs.supportEmail }}
        shell: cmd

      - name: Bundle Node.js (Windows)
        shell: bash
        run: |
          mkdir -p bundled-node
          curl -fsSL "https://nodejs.org/dist/v22.19.0/node-v22.19.0-win-x64.zip" -o /tmp/node.zip
          unzip -q /tmp/node.zip -d /tmp/node-extract
          cp "/tmp/node-extract/node-v22.19.0-win-x64/node.exe" bundled-node/node.exe

      - name: Build
        run: npm run build

      - name: Package
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to COS
        shell: bash
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          npm install -g coscmd 2>/dev/null || pip install coscmd
          EXE_FILE=$(ls release/*.exe 2>/dev/null | head -1)
          if [ -n "$EXE_FILE" ]; then
            FILENAME=$(basename "$EXE_FILE")
            KEY="claw-builds/${BUILD_ID}/${FILENAME}"
            coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" -b "$COS_BUCKET" -r "$COS_REGION"
            coscmd upload "$EXE_FILE" "$KEY"
            CDN="${{ secrets.COS_CDN_DOMAIN }}"
            [ -z "$CDN" ] && CDN="https://${COS_BUCKET}.cos.${COS_REGION}.myqcloud.com"
            echo "WIN_URL=${CDN}/${KEY}" >> $GITHUB_ENV
          fi

      - name: Callback - success
        if: success()
        shell: bash
        run: |
          curl -fsSL -X PUT "${{ github.event.inputs.callbackUrl }}" \
            -H "Content-Type: application/json" \
            -H "X-Build-Secret: ${{ secrets.BUILD_CALLBACK_SECRET }}" \
            -d "{\"status\":2,\"winUrl\":\"${WIN_URL}\"}"

      - name: Callback - failure
        if: failure()
        shell: bash
        run: |
          curl -fsSL -X PUT "${{ github.event.inputs.callbackUrl }}" \
            -H "Content-Type: application/json" \
            -H "X-Build-Secret: ${{ secrets.BUILD_CALLBACK_SECRET }}" \
            -d '{"status":3,"buildLog":"Windows build failed"}'

  build-mac:
    if: contains(github.event.inputs.platforms, 'mac')
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download logo
        if: github.event.inputs.logoUrl != ''
        run: curl -fsSL "${{ github.event.inputs.logoUrl }}" -o resources/icon.png || true

      - name: Inject brand
        run: |
          node scripts/build-branded.js \
            --siteUrl="${{ github.event.inputs.siteUrl }}" \
            --siteName="${{ github.event.inputs.siteName }}" \
            --licenseKey="${{ github.event.inputs.licenseKey }}" \
            --color="${{ github.event.inputs.primaryColor }}" \
            --supportWechat="${{ github.event.inputs.supportWechat }}" \
            --supportEmail="${{ github.event.inputs.supportEmail }}"

      - name: Bundle Node.js (macOS x64)
        run: bash scripts/bundle-node.sh darwin x64

      - name: Build
        run: npm run build

      - name: Package (x64 + arm64)
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to COS
        env:
          COS_SECRET_ID: ${{ secrets.COS_SECRET_ID }}
          COS_SECRET_KEY: ${{ secrets.COS_SECRET_KEY }}
          COS_BUCKET: ${{ secrets.COS_BUCKET }}
          COS_REGION: ${{ secrets.COS_REGION }}
        run: |
          pip3 install coscmd
          coscmd config -a "$COS_SECRET_ID" -s "$COS_SECRET_KEY" -b "$COS_BUCKET" -r "$COS_REGION"
          CDN="${{ secrets.COS_CDN_DOMAIN }}"
          [ -z "$CDN" ] && CDN="https://${COS_BUCKET}.cos.${COS_REGION}.myqcloud.com"

          MAC_X64_URL=""
          MAC_ARM64_URL=""

          for DMG in release/*.dmg; do
            [ -f "$DMG" ] || continue
            FNAME=$(basename "$DMG")
            KEY="claw-builds/${BUILD_ID}/${FNAME}"
            coscmd upload "$DMG" "$KEY"
            URL="${CDN}/${KEY}"
            if echo "$FNAME" | grep -qi "arm64"; then
              MAC_ARM64_URL="$URL"
            else
              MAC_X64_URL="$URL"
            fi
          done

          echo "MAC_X64_URL=${MAC_X64_URL}" >> $GITHUB_ENV
          echo "MAC_ARM64_URL=${MAC_ARM64_URL}" >> $GITHUB_ENV

      - name: Callback - success
        if: success()
        run: |
          curl -fsSL -X PUT "${{ github.event.inputs.callbackUrl }}" \
            -H "Content-Type: application/json" \
            -H "X-Build-Secret: ${{ secrets.BUILD_CALLBACK_SECRET }}" \
            -d "{\"status\":2,\"macX64Url\":\"${MAC_X64_URL}\",\"macArm64Url\":\"${MAC_ARM64_URL}\"}"

      - name: Callback - failure
        if: failure()
        run: |
          curl -fsSL -X PUT "${{ github.event.inputs.callbackUrl }}" \
            -H "Content-Type: application/json" \
            -H "X-Build-Secret: ${{ secrets.BUILD_CALLBACK_SECRET }}" \
            -d '{"status":3,"buildLog":"macOS build failed"}'
